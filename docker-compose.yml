# 本地 PostgreSQL + Nginx（bridge + 端口映射，Win/Mac/Linux 均可用）
# 启动: cd server && docker compose up -d
# 访问: http://localhost （nginx 80）；/api/ 与 /Clan/ 反代到本机 8080（统一 Web 服务需提供 /api/* 与 /Clan/*.asp）
services:
  nginx:
    image: nginx:alpine
    container_name: jpstale-nginx
    user: root
    ports:
      - "80:80"
    volumes:
      - ./www:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jpstale-redis
    ports:
      - "6379:6379"
    environment:
      REDIS_USER: redis
      REDIS_PASSWORD: 123456
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: jpstale-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: pt
      TZ: Asia/Shanghai
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata: