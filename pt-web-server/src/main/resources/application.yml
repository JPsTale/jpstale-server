server:
  port: ${PT_WEB_PORT:8080}

spring:
  application:
    name: pt-web-server
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:postgresql://localhost:5432/pt
          username: ${DB_USER:postgres}
          password: ${DB_PASSWORD:123456}
          driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:0}
    timeout: 10s
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

sa-token:
  token-name: satoken
  timeout: 86400
  is-concurrent: true
  is-share: false
