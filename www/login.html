<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理员登录 - PristonTale</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>管理员登录</h1>
      <p>登录后可访问 Web 管理后台</p>
    </header>
    <main class="card">
      <div id="loginMsg" class="msg hidden" role="alert"></div>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginAccount">账号</label>
          <input type="text" id="loginAccount" name="account" placeholder="请输入账号" autocomplete="username" required maxlength="32">
        </div>
        <div class="form-group">
          <label for="loginPassword">密码</label>
          <input type="password" id="loginPassword" name="password" placeholder="请输入密码" autocomplete="current-password" required maxlength="64">
        </div>
        <button type="submit" class="btn" id="loginSubmitBtn">登录</button>
        <a href="/index.html" class="btn btn-secondary">返回首页</a>
      </form>
    </main>
    <footer class="footer">
      <span class="links">
        <a href="/index.html">返回首页</a>
        ·
        <a href="/register.html">注册账号</a>
      </span>
    </footer>
  </div>
  <script src="/js/login.js"></script>
</body>
</html>
